<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="googleeb9128e03ea24cde">
    
    <title>GamyGoGo | Tu Portal de Juegos</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="239949" async data-cfasync="false"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .game-container { 
            position: relative; 
            padding-bottom: 75%; 
            height: 0; 
            overflow: hidden; 
            background: #000; 
            border-radius: 12px; 
        }
        @media (min-width: 768px) {
            .game-container { padding-bottom: 50%; }
        }
        .game-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .game-card { transition: all 0.3s ease; border: 1px solid #1e293b; background: #111827; }
        .game-card:hover { transform: translateY(-5px); border-color: #facc15; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-yellow-400 tracking-tighter">GAMY<span class="text-white">GOGO</span></h1>
        <div class="flex gap-2">
            <button id="installBtn" class="bg-yellow-400 text-black px-6 py-2 rounded-full font-bold hover:bg-yellow-300 transition neon-border text-sm">INSTALAR</button>
        </div>
    </header>

    <section class="mb-12 max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 id="titulo-actual" class="text-xl font-bold flex items-center uppercase">
                <span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> BIENVENIDO A GAMYGOGO
            </h2>
        </div>
        <div class="game-container shadow-2xl border-4 border-gray-800">
            <iframe id="pantalla-principal" src="https://html5.gamemonetize.co/cihth2bbe2a0ntw3ylj8srfz268e4nty/" scrolling="none"></iframe>
        </div>
    </section>

    <section class="max-w-6xl mx-auto">
        <h3 class="text-sm font-bold mb-6 text-gray-500 uppercase tracking-widest text-center">Catálogo de Juegos</h3>
        
        <div id="grid-juegos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </section>

    <footer class="mt-20 py-10 border-t border-gray-800 text-center text-gray-600 text-xs uppercase tracking-widest">
        <p>&copy; 2026 GamyGoGo | <a href="privacidad.html" class="underline">Privacidad</a></p>
    </footer>

    <script>
        // Cargar los juegos llamando a nuestro servidor puente en Railway
        document.addEventListener("DOMContentLoaded", async () => {
            // Buscamos tu grilla de juegos (por ID o intentando encontrar el contenedor de las tarjetas)
            let grid = document.getElementById('grid-juegos');
            
            // SEGURO ALFA: Si no encuentra el ID, busca el primer contenedor que tenga la grilla de Tailwind
            if (!grid) {
                grid = document.querySelector('.grid');
            }

            // Si a pesar de todo no encuentra nada, dejamos un aviso en consola y salimos para no colapsar
            if (!grid) {
                console.error("No se encontró el contenedor del catálogo en el HTML.");
                return;
            }

            try {
                // Llamamos a nuestra propia API interna de Railway (libre de CORS)
                const response = await fetch('/api/juegos');
                if (!response.ok) throw new Error('Error en el servidor');
                
                const listaFinal = await response.json();

                // Limpiamos el catálogo viejo de forma segura
                grid.innerHTML = ""; 

                // Recorremos y pintamos las tarjetas de juegos automáticamente
                listaFinal.forEach(juego => {
                    if (juego && (juego.url || juego.id)) {
                        const card = document.createElement('div');
                        
                        // Respetamos tus clases exactas de modo oscuro de GamyGoGo
                        card.className = "game-card p-3 rounded-xl cursor-pointer flex flex-col justify-between";
                        
                        const juegoUrl = juego.url || `https://html5.gamemonetize.co/${juego.id}/`;
                        const juegoThumb = juego.thumb || juego.image || 'https://placehold.co/512x384/333/fff?text=Juego';

                        card.onclick = () => cambiarJuego(juegoUrl, juego.title || 'Juego Gratis');

                        card.innerHTML = `
                            <img src="${juegoThumb}" class="rounded-lg mb-2 w-full aspect-square object-cover" onerror="this.src='https://placehold.co/512x384/333/fff?text=Juego'">
                            <p class="text-xs font-bold text-yellow-400 truncate uppercase text-center">${juego.title || 'Juego'}</p>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("Error al pintar el catálogo:", error);
                grid.innerHTML = "<p class='col-span-full text-center text-red-500 font-bold p-4'>Error al conectar con el servidor de juegos.</p>";
            }
        });

        function cambiarJuego(url, nombre) {
            const pantalla = document.getElementById('pantalla-principal');
            const titulo = document.getElementById('titulo-actual');
            
            if (pantalla) pantalla.src = url;
            if (titulo) titulo.innerHTML = '<span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: ' + nombre.toUpperCase();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
