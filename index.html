<script>
        // 1. Cargar los juegos directamente desde la API oficial sin pasar por el servidor
        document.addEventListener("DOMContentLoaded", async () => {
            const grid = document.getElementById('grid-juegos');
            
            // Usamos la URL directa forzando formato JSON y limitada a 50 juegos
            const urlApiDirecta = 'https://gamemonetize.com/feed.php?format=json&num=50&page=1';

            try {
                const response = await fetch(urlApiDirecta);
                const juegos = await response.json();

                // Asegurar que leemos el listado correcto si viene envuelto
                const listaFinal = Array.isArray(juegos) ? juegos : (juegos.juegos || Object.values(juegos));

                // Limpiar el contenedor por si acaso
                grid.innerHTML = "";

                // Recorremos la lista masiva que nos dio la API directamente
                listaFinal.forEach(juego => {
                    // Validamos que el juego tenga los datos mínimos requeridos
                    if (juego && (juego.url || juego.id)) {
                        const card = document.createElement('div');
                        card.className = "game-card p-3 rounded-xl cursor-pointer flex flex-col justify-between";
                        
                        // Si no trae URL directa, usamos la estructura estándar de reproducción de ellos
                        const juegoUrl = juego.url || `https://html5.gamemonetize.co/${juego.id}/`;
                        const juegoThumb = juego.thumb || juego.image || 'https://placehold.co/512x384/333/fff?text=Juego';

                        card.onclick = () => cambiarJuego(juegoUrl, juego.title || 'Juego Gratis');

                        card.innerHTML = `
                            <img src="${juegoThumb}" class="rounded-lg mb-2 w-full aspect-square object-cover" onerror="this.src='https://placehold.co/512x384/333/fff?text=Juego'">
                            <p class="text-xs font-bold text-yellow-400 truncate uppercase text-center">${juego.title || 'Juego'}</p>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("Error al pintar el catálogo directo:", error);
                grid.innerHTML = "<p class='col-span-full text-center text-red-500'>Error al conectar con el servidor de juegos. Inténtalo más tarde.</p>";
            }
        });

        // 2. Función para reproducir el juego y activar tu monetización
        function cambiarJuego(url, nombre) {
            // 🔥 MONETIZACIÓN AUTOMÁTICA: Tu script de Monetag se ejecuta al hacer clic aquí.
            const pantalla = document.getElementById('pantalla-principal');
            const titulo = document.getElementById('titulo-actual');
            
            pantalla.src = url;
            titulo.innerHTML = '<span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: ' + nombre.toUpperCase();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
