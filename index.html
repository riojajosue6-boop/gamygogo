<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamyGoGo | Juegos Online Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .neon-border { border: 2px solid #facc15; box-shadow: 0 0 15px #facc15; }
        .game-card { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .game-card:hover { transform: translateY(-5px); border-color: #facc15; box-shadow: 0 0 10px rgba(250, 204, 21, 0.3); }
        .game-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; }
        .game-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-yellow-400 tracking-tighter">GAMY<span class="text-white">GOGO</span></h1>
        <button id="installBtn" class="bg-yellow-400 text-black px-6 py-2 rounded-full font-bold hover:bg-yellow-300 transition neon-border">
            INSTALAR APP
        </button>
    </header>

    <section class="mb-12 max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 id="titulo-actual" class="text-2xl font-bold flex items-center">
                <span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: FIND HIDDEN CATS
            </h2>
        </div>
        <div class="game-container shadow-2xl overflow-hidden border-4 border-gray-800">
            <iframe id="pantalla-principal" src="https://html5.gamedistribution.com/892fa29a7d4145958b37ea309752bf1b/?gd_sdk_referrer_url=https://gamygogo-production.up.railway.app" scrolling="none"></iframe>
        </div>
    </section>

    <section class="max-w-6xl mx-auto">
        <h3 class="text-xl font-bold mb-6 text-gray-400 uppercase tracking-widest text-center">Selecciona un Juego</h3>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            
            <div onclick="cambiarJuego('892fa29a7d4145958b37ea309752bf1b', 'Find Hidden Cats')" class="game-card bg-gray-900 p-3 rounded-xl cursor-pointer">
                <img src="https://img.gamedistribution.com/892fa29a7d4145958b37ea309752bf1b-512x512.jpeg" class="rounded-lg mb-3 w-full aspect-square object-cover" alt="Find Hidden Cats">
                <p class="text-sm font-bold text-center truncate">Find Hidden Cats</p>
            </div>

            <div onclick="cambiarJuego('bd478cd5791e4568a2352f5a03d35ed1', 'Two RX7 Drifters')" class="game-card bg-gray-900 p-3 rounded-xl cursor-pointer">
                <img src="https://img.gamedistribution.com/bd478cd5791e4568a2352f5a03d35ed1-512x512.jpeg" class="rounded-lg mb-3 w-full aspect-square object-cover" alt="Two RX7 Drifters">
                <p class="text-sm font-bold text-center truncate">Two RX7 Drifters</p>
            </div>
            <div onclick="cambiarJuego('659090e00bfc4650899550d63f8a130d', 'Slicer Duo')" class="game-card bg-gray-900 p-3 rounded-xl cursor-pointer">
                <img src="https://img.gamedistribution.com/659090e00bfc4650899550d63f8a130d-512x512.jpeg" class="rounded-lg mb-3 w-full aspect-square object-cover" alt="Slicer Duo">
                <p class="text-sm font-bold text-center truncate">Slicer Duo</p>
            </div>

            </div>
    </section>

    <footer class="mt-20 py-10 border-t border-gray-800 text-center">
        <div class="flex justify-center gap-6 mb-4 text-gray-500 font-medium">
            <a href="privacidad.html" class="hover:text-yellow-400 transition">Privacidad</a>
            <a href="cookies.html" class="hover:text-yellow-400 transition">Cookies</a>
        </div>
        <p class="text-gray-600 text-xs uppercase tracking-widest">&copy; 2026 GamyGoGo Engine v2.0</p>
    </footer>

    <script src="https://pl29030409.profitablecpmratenetwork.com/88/da/91/88da917cb4cc7f4468988b461c897365.js"></script>

    <script>
        function cambiarJuego(id, nombre) {
            const pantalla = document.getElementById('pantalla-principal');
            const titulo = document.getElementById('titulo-actual');
            
            // Actualizamos el iframe con el ID del juego y tu dominio de Railway
            pantalla.src = `https://html5.gamedistribution.com/${id}/?gd_sdk_referrer_url=https://gamygogo-production.up.railway.app`;
            
            // Actualizamos el título visual
            titulo.innerHTML = `<span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: ${nombre.toUpperCase()}`;
            
            // Subimos al inicio para jugar cómodo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('installBtn').onclick = () => {
            alert('¡GamyGoGo se instalará en tu dispositivo!');
        };
    </script>
</body>
</html>
