<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="googleeb9128e03ea24cde">
    <title>GamyGoGo | Tu Portal de Juegos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .game-card { transition: all 0.3s ease; border: 1px solid #1e293b; background: #111827; }
        .game-card:hover { transform: translateY(-5px); border-color: #facc15; }
        .game-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; }
        .game-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-yellow-400 tracking-tighter">GAMY<span class="text-white">GOGO</span></h1>
    </header>

    <section class="mb-12 max-w-5xl mx-auto">
        <h2 id="titulo-actual" class="text-xl font-bold mb-4 uppercase flex items-center">
            <span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: SELECCIONA UN JUEGO
        </h2>
        <div class="game-container shadow-2xl border-4 border-gray-800">
            <iframe id="pantalla-principal" src="about:blank"></iframe>
        </div>
    </section>

    <section class="max-w-6xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            
            <div onclick="cambiarJuego('cihth2bbe2a0ntw3ylj8srfz268e4nty', 'Carrera de Reliquias')" class="game-card p-3 rounded-xl cursor-pointer text-center">
                <img src="https://img.gamemonetize.com/cihth2bbe2a0ntw3ylj8srfz268e4nty/512x384.jpg" class="rounded-lg mb-2">
                <p class="text-xs font-bold text-yellow-400 uppercase">Carrera de Reliquias</p>
            </div>

            <div onclick="cambiarJuego('f9bqfxgmw2s5camuffa084p4dmed6rbl', 'Carrera del Monstruo')" class="game-card p-3 rounded-xl cursor-pointer text-center">
                <img src="https://img.gamemonetize.com/f9bqfxgmw2s5camuffa084p4dmed6rbl/512x384.jpg" class="rounded-lg mb-2">
                <p class="text-xs font-bold text-yellow-400 uppercase">Carrera del Monstruo</p>
            </div>

            <div onclick="cambiarJuego('ikh1qxnldwl6x7lc8xapp1src26tbdtj', 'Duelo de Penaltis')" class="game-card p-3 rounded-xl cursor-pointer text-center">
                <img src="https://img.gamemonetize.com/ikh1qxnldwl6x7lc8xapp1src26tbdtj/512x384.jpg" class="rounded-lg mb-2">
                <p class="text-xs font-bold text-yellow-400 uppercase">Duelo de Penaltis</p>
            </div>
            
            <div onclick="cambiarJuego('sp9y4nfqp0kkd5rg8r0y45pgjszfu772', 'Glamour de los 2000')" class="game-card p-3 rounded-xl cursor-pointer text-center">
            <img src="https://img.gamemonetize.com/sp9y4nfqp0kkd5rg8r0y45pgjszfu772/512x384.jpg" class="rounded-lg mb-2 w-full aspect-square object-cover" onerror="this.src='https://placehold.co/512x512/333/fff?text=Glam+Clash'">
            <p class="text-[10px] font-medium text-gray-500 uppercase tracking-tighter truncate text-center">Sid & Ginny Y2K Glam</p>
            <p class="text-xs font-bold text-yellow-400 truncate uppercase text-center">Glamour de los 2000</p>
            </div
                
            <div onclick="cambiarJuego('q662za2h4ew3qlt2e3z9prb1gnsdwqln', 'Uñas de Superhéroes')" class="game-card p-3 rounded-xl cursor-pointer text-center">
            <img src="https://img.gamemonetize.com/q662za2h4ew3qlt2e3z9prb1gnsdwqln/512x384.jpg" class="rounded-lg mb-2 w-full aspect-square object-cover" onerror="this.src='https://placehold.co/512x512/333/fff?text=Nails+Makeover'">
            <p class="text-[10px] font-medium text-gray-500 uppercase tracking-tighter truncate text-center">Superhero Nails Makeover</p>
            <p class="text-xs font-bold text-yellow-400 truncate uppercase text-center">Uñas de Superhéroes</p>
            </div>

        </div>
    </section>

    <script>
        function cambiarJuego(id, nombre) {
            const pantalla = document.getElementById('pantalla-principal');
            const titulo = document.getElementById('titulo-actual');
            
            // Esta es la URL que NUNCA debería fallar (Cargando directamente el HTML del juego)
            const urlFinal = "https://html5.gamemonetize.co/" + id + "/";
            
            console.log("Cargando juego: " + urlFinal); // Esto nos ayudará a ver errores en la consola
            
            pantalla.src = urlFinal;
            titulo.innerHTML = '<span class="w-3 h-8 bg-yellow-400 mr-3 rounded-full"></span> JUGANDO: ' + nombre;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
